paths:
  dataset_dir: Dataset
  output_dir:  cdi_output

data:
  concentration_file: "1000-2500-5000-7500 ppm.xlsx"
  flow_file:          "vary flow rate.xlsx"
  potential_file:     "Vary potential-1000ppm.xlsx"
  sheet_meta:
    concentration:
      fixed_flow:      3
      fixed_potential: 1.8
    flow:
      fixed_conc:      1000
      fixed_potential: 1.8
    potential:
      fixed_conc: 1000
      fixed_flow: 3

gp:
  n_iter:           300
  lr:               0.05
  noise_constraint: 1.0e-4   # lower bound on GP noise variance

  # Grid search — set enabled: true to tune n_iter and lr before the main run.
  # Best params found are printed and used automatically for all subsequent GP fits.
  # Adds ~2–5 min on GPU; disable for quick reruns.
  grid_search:
    enabled: false
    n_iter_values:  [100, 200, 300, 500]
    lr_values:      [0.001, 0.01, 0.05, 0.1]
    noise_values:   [1.0e-5, 1.0e-4, 1.0e-3]
    cv_folds:       3      # inner k-fold on training data (not full LOCO — too slow)

calibration:
  nominal_z:    1.645   # z-score for 90 % nominal CI
  target_low:   0.85
  target_high:  0.95
  alpha_search: [0.05, 20.0, 0.05]   # [start, stop, step] for multiplier sweep

pareto:
  grid_points: 30        # per-axis resolution for conc/flow/potential grids

figures:
  dpi:    300
  format: png
